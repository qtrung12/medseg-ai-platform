
services:

  postgres:
    image: postgres:14
    container_name: medseg_postgres
    restart: always
    environment:
      POSTGRES_USER: medseg
      POSTGRES_PASSWORD: medseg123
      POSTGRES_DB: medseg_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: medseg_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: medseg_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: